    <title>My Profile Page</title>
    <style>
        /* Making the body look nice */
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;

            padding: 20px;
            background-color: #ffffff;
        }

        /* Styling the headings */
        h1 {
            color: #2c3e50;
            text-align:center
        }

        /* Making the image responsive */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 20px;
        }

        /* Styling the links */
        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration:dashed;
        }

        /* Styling paragraphs */
        p {
            line-height: 1.6;
            color: #333;
        }
    </style>
</head>
