<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>

        /* Making the body look nice */
        body {
            font-family: 'Inter', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff;
        }

        /* Styling the headings */
        h1 {
            font-size: 24px;
            color: #2c3e50;
            text-align:center
        }

        /* Making the image responsive */
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
            border-radius: 20px;
        }

        /* Styling the links */
        a {
            color: #3498db;
            text-decoration: none;
        }

        a:hover {
            text-decoration:dashed;
        }

        /* Styling paragraphs */
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }
    </style>

</head>

    <body>
    <h1>Welcome to My Profile</h1>

        <!-- Adding an image -->
    <img src="boxicons-YACiVUXCvO8-unsplash.jpg" alt="Profile picture placeholder">
        <h2>About Me</h2>
    <p>Hello! I'm learning web development. This is my first webpage where I'm practicing HTML and CSS.</p>
    <h2>Contact Details</h2>

        <!-- Adding hyperlinks -->
<ul>
    <li><a href="https://www.linkedin.com/in/jamie-tomlinson1" target="_blank">LinkedIn</a></li>
    <li><a href="mailto:jamietomlinson312@gmail.com">Contact Email</a></li>
</ul>

    </body>
</html>
