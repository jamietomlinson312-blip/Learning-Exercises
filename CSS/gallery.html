<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid practice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <!-- Nav bar-->
    <div class="relative w-full">
        <header class="absolute w-full  bg-slate-900 p-1 flex flex-col" >
            <h1 class="text-olive-200 p-2 text-4xl sm:text-2xl font-bold">My Tailwind Website</h1>
            <nav class="p-1 flex">
                <a class="text-olive-50 m-2 p-1 bg-gray-500 border-2 rounded border-indigo-50 block 
                sm:inline text-xl sm:text-sm" href="tailwindcss-practice.html">Home</a>
                <a class="text-olive-50 m-2 p-1 bg-gray-500 border-2 rounded border-indigo-50 block 
                sm:inline text-xl sm:text-sm" href="#gallery">Gallery</a>
                <a class="text-olive-50 m-2 p-1 bg-gray-500 border-2 rounded border-indigo-50 block 
                sm:inline text-xl sm:text-sm" href="#about">About us</a>
                <a class="text-olive-50 m-2 p-1 bg-gray-500 border-2 rounded border-indigo-50 block 
                sm:inline text-xl sm:text-sm" href="#contact">Contact</a>
            </nav>
        </header>
    </div>

    <!-- Gallery Section -->

    <main class= "p-2 flex justify-center bg-linear-to-r from-slate-500 to-slate-100">
        <section class="relative mt-40 p-2 grid sm:grid-cols-3 gap-4">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/shahadat-osman-MYLgGtYdB0M-unsplash.jpg"
            alt="Abstract wavy layers of blue and orange">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/anupam-raisim-kerketta-Um83jYHi3J4-unsplash.jpg"
            alt="Abstract background with flowing shapes in blue and dark grey">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/anupam-raisim-kerketta-YCv3NNjYi6Q-unsplash.jpg"
            alt="Abstract background with two wavy colour blocks">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/public-domain-vectors-9fRz9KKhOTg-unsplash.jpg"
            alt="Abstract blue background with flowing lines">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/sumit-singh-c7BEDRhohNE-unsplash.jpg"
            alt="Abstract red and beige shapes intersecting">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/wahyu-setyanto-d5aNg1oYI4M-unsplash.jpg"
            alt="bright sky with fluffy clouds">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/brigitte-elsner-j3CktdBdPpM-unsplash.jpg"
            alt="Boquet of pink tuplips against a blue background">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/vectorelements-YPs1v3IBHdM-unsplash.jpg"
            alt="Man interacting with cloud data upload on smartphone">
            <img class="w-64 h-64 border-2 rounded-md border-slate-700" src="images/sonika-agarwal-50J9PFD1n2c-unsplash.jpg"
            alt="Vibrant geometric pattern of colourful squares and triangles">
        </section>
    </main>

    <!-- Footer section-->
     
    <footer class="bg-slate-900 p-1 static w-full" >
            <nav class="p-1 flex justify-center">
                <a class="text-olive-50 text-xs m-1 p-0.5 underline " href="tailwindcss-practice.html">Home</a>
                <a class="text-olive-50 text-xs m-1 p-0.5 underline" href="gallery.html">Gallery</a>
                <a class="text-olive-50 text-xs m-1 p-0.5 underline" href="#about">About us</a>
                <a class="text-olive-50 text-xs m-1 p-0.5 underline" href="#contact">Contact</a>
            </nav>
            <div class="flex flex-col p-2">
                <p class="text-olive-50 text-xs">&copy; JT ltd.</p>
                <p class="text-olive-50 text-xs">44 Address Road <br>
                    LivingPlace<br>
                    4444
                </p>
                <p class="text-olive-50 text-xs">brought to you by TailwindCSS</p>
            </div>
        </footer>
</body>
</html>
